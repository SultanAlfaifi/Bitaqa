spring.application.name=bitaqa

# ── Server ──────────────────────────────────────────────
# PORT is injected by Railway; falls back to 8080 locally
server.port=${PORT:8080}

# ── MySQL DataSource ─────────────────────────────────────
# Railway provides: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Locally override via env or .env file (never commit real passwords)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:bitaqa_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ──────────────────────────────────────
# 'update' lets Hibernate create/alter tables automatically on first deploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────
# Set JWT_SECRET to a strong random value in Railway environment variables
app.jwt.secret-key=${JWT_SECRET:change-this-secret-in-production-min-32-chars!!}
app.jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
app.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}

# ── App limits ───────────────────────────────────────────
app.analytics.dedup-window-minutes=60
app.profile.max-skills=30
app.profile.max-links=10
app.profile.max-projects=20

# ── Jackson ──────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
